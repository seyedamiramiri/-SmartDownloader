name: SmartDownloader - Ultra-Stable v5

on:
  workflow_dispatch:

jobs:
  ultra:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Set up job
        run: echo "::group::[INIT] Setting up workspace"
      
      - name: 📂 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Install tools (Ultra‑Safe)
        shell: bash
        run: |
          set -e
          echo "::group::[TOOLS] Installing dependencies"
          sudo apt update -q
          sudo apt install -y curl aria2 ca-certificates zip unzip git > /dev/null
          echo "::endgroup::"

      - name: 📁 Prepare workspace
        shell: bash
        run: |
          set -e
          mkdir -p downloads logs
          echo "🏗 Workspace ready at $(pwd)/downloads"

      - name: 🌐 Smart Download Engine
        shell: bash
        run: |
          set -e
          echo "::group::[ENGINE] Starting download"
          URLS=("https://download.pytorch.org/whl/cu121/torch-2.2.2+cu121-cp310-cp310-linux_x86_64.whl")
          for url in "${URLS[@]}"; do
            echo "⏳ Downloading: $url"
            if [[ "$url" == *"pytorch.org"* ]]; then
              curl -L --retry 5 -o "downloads/$(basename $url)" "$url"
            else
              aria2c -x1 -s1 --retry-wait=5 --max-tries=5 -d downloads "$url"
            fi
          done
          echo "::endgroup::"

      - name: 🧠 Commit & Push (SecureZIP fallback + Debug)
        shell: bash
        run: |
          set -e
          exec > >(tee logs/ultra_log.txt) 2>&1
          echo "::group::[COMMIT] SecureZIP fallback with debug"
          timestamp() { date +'%H:%M:%S'; }

          echo "$(timestamp) 🪶 Configuring Git..."
          git config --global user.email "actions@github.com"
          git config --global user.name "SmartDownloader"

          echo "$(timestamp) 📦 Checking disk usage..."
          DISK_USE=$(df -h . | tail -1)
          echo "$(timestamp) 💾 Disk info: $DISK_USE"

          SIZE_MB=$(du -sm downloads | cut -f1 || echo 0)
          echo "$(timestamp) 📁 Total size: ${SIZE_MB}MB"

          git add downloads || echo "$(timestamp) ⚠ Nothing to add"
          git commit -m "Auto batch commit [$(timestamp)]" || echo "Nothing to commit"
          git pull origin main --rebase || echo "No rebase needed"

          echo "$(timestamp) 🚀 Trying push..."
          if ! git push origin main; then
            echo "$(timestamp) ⚠ Push failed → entering ZIP fallback mode"
            mkdir -p /tmp/sdzip
            ZIP_PATH="/tmp/sdzip/downloads_secure.zip"
            echo "$(timestamp) Creating ZIP at $ZIP_PATH..."
            if ! zip -r "$ZIP_PATH" downloads; then
              echo "❌ ZIP command not found or failed (exit 127)"
              echo "::error title=ZIP failed::Please verify zip installation."
              exit 127
            fi
            rm -rf downloads
            mkdir downloads
            mv "$ZIP_PATH" downloads/
            du -sh downloads
            git add downloads
            git commit -m "🧩 ZIP fallback commit [$(timestamp)]"
            git push origin main --force
          fi

          echo "::endgroup::"

      - name: 🧾 Finish
        shell: bash
        run: |
          echo "::group::[FINISH] Job completed"
          echo "✅ SmartDownloader Ultra-Stable v5 finished successfully"
          ls -lh downloads || true
          echo "::endgroup::"

      - name: Download Windows PyTorch Wheels (Zero Dependencies)
        run: |
          set -e
          mkdir -p downloads

          PY="${{ github.event.inputs.python_ver }}"
          CUDA="${{ github.event.inputs.cuda_ver }}"
          TORCH="${{ github.event.inputs.torch_ver }}"

          PY_MAJOR=$(echo $PY | cut -d '.' -f1)
          PY_MINOR=$(echo $PY | cut -d '.' -f2)
          PYTAG="${PY_MAJOR}${PY_MINOR}"

          BASE_FLAGS="
            --platform win_amd64
            --python-version $PYTAG
            --implementation cp
            --abi cp$PYTAG
            --only-binary=:all:
            --no-deps
          "

          pip download torch=="$TORCH" $BASE_FLAGS \
            --index-url https://download.pytorch.org/whl/$CUDA \
            -d downloads/

          pip download torchvision $BASE_FLAGS \
            --index-url https://download.pytorch.org/whl/$CUDA \
            -d downloads/

          pip download torchaudio $BASE_FLAGS \
            --index-url https://download.pytorch.org/whl/$CUDA \
            -d downloads/

          echo "Downloaded WHLs:"
          ls -lh downloads
